<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:0; }
header { background:#007bff; color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
header h1 { font-size:1.5rem; }
button { cursor:pointer; }
.container { max-width:1200px; margin:2rem auto; padding:1rem; }
.user-table { width:100%; border-collapse: collapse; background:white; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
.user-table th, .user-table td { padding:12px; text-align:left; border-bottom:1px solid #ddd; }
.user-table th { background:#007bff; color:white; }
.user-table tr:hover { background:#f1f1f1; }
.action-btn { padding:6px 12px; border:none; border-radius:4px; color:white; }
.email-btn { background:#28a745; }
.fund-btn { background:#ffc107; color:#333; }
.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
.modal-content { background:white; padding:2rem; border-radius:8px; width:300px; }
.modal-content input, .modal-content textarea { width:100%; padding:0.5rem; margin:0.5rem 0 1rem 0; }
.close { float:right; cursor:pointer; color:red; }
.notification { position:fixed; top:20px; right:20px; background:#28a745; color:white; padding:1rem; border-radius:4px; display:none; }
.notification.error { background:#dc3545; }
</style>
</head>
<body>

<header>
<h1>Admin Dashboard</h1>
<button onclick="logout()">Logout</button>
</header>


<!-- Add this above the user table -->
<div style="margin-bottom:1rem;">
  <button class="action-btn email-btn" onclick="openCreateUserModal()">Create New User</button>
</div>

<!-- Create User Modal -->
<div class="modal" id="createUserModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal('createUserModal')">&times;</span>
    <h3>Create New User</h3>
    <input type="text" id="newFullName" placeholder="Full Name">
    <input type="email" id="newEmail" placeholder="Email">
    <input type="text" id="newPhone" placeholder="Phone">
    <input type="password" id="newPassword" placeholder="Password">
    <button class="action-btn email-btn" onclick="createUser()">Create</button>
  </div>
</div>



<div class="container">
<h2>Users</h2>
<table class="user-table" id="userTable">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Status</th>
<th>Balance</th>
<th>Actions</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<!-- Email Modal -->
<div class="modal" id="emailModal">
<div class="modal-content">
<span class="close" onclick="closeModal('emailModal')">&times;</span>
<h3>Send Email</h3>
<input type="text" id="emailTo" readonly>
<input type="text" id="emailSubject" placeholder="Subject">
<textarea id="emailMessage" rows="4" placeholder="Message"></textarea>
<button class="action-btn email-btn" onclick="sendEmail()">Send</button>
</div>
</div>

<!-- Fund Modal -->
<div class="modal" id="fundModal">
<div class="modal-content">
<span class="close" onclick="closeModal('fundModal')">&times;</span>
<h3>Fund Account</h3>
<input type="text" id="fundUser" readonly>
<input type="number" id="fundAmount" placeholder="Amount to Add">
<button class="action-btn fund-btn" onclick="fundUser()">Add Funds</button>
</div>
</div>

<div class="notification" id="notification"></div>

<script>
let usersData = [];
let selectedUserId = null;

// Fetch users from backend
async function loadUsers() {
    try {
        const res = await fetch('/api/admin/users', { credentials:'include' });
        if(res.ok){
            usersData = await res.json();
            renderUsers();
        } else throw new Error('Failed to fetch users');
    } catch(e){
        console.error(e);
        showNotification('Failed to load users','error');
    }
}

function renderUsers() {
    const tbody = document.querySelector('#userTable tbody');
    tbody.innerHTML = '';
    usersData.forEach(user => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
        <td>${user.fullName}</td>
        <td>${user.email}</td>
        <td>${user.status || 'Active'}</td>
        <td>$${(user.balance || 0).toFixed(2)}</td>
        <td>
            <button class="action-btn email-btn" onclick="openEmailModal('${user._id}')">Email</button>
            <button class="action-btn fund-btn" onclick="openFundModal('${user._id}')">Fund</button>
            <button class="action-btn" style="background:red;" onclick="deleteUser('${user._id}')">Delete</button>
        </td>
        `;
        tbody.appendChild(tr);
    });
}


// Open/close modals
function openEmailModal(userId){
    selectedUserId = userId;
    // const user = usersData.find(u=>u.id===userId);
    const user = usersData.find(u => u._id === userId); // ✅

    document.getElementById('emailTo').value = user.email;
    document.getElementById('emailSubject').value = '';
    document.getElementById('emailMessage').value = '';
    document.getElementById('emailModal').style.display = 'flex';
}
function openFundModal(userId){
    selectedUserId = userId;
    // const user = usersData.find(u=>u.id===userId);
    const user = usersData.find(u => u._id === userId); // ✅

    document.getElementById('fundUser').value = user.fullName;
    document.getElementById('fundAmount').value = '';
    document.getElementById('fundModal').style.display = 'flex';
}
function closeModal(id){ document.getElementById(id).style.display='none'; }

// Send email via backend
async function sendEmail(){
    const subject = document.getElementById('emailSubject').value;
    const message = document.getElementById('emailMessage').value;
    if(!subject||!message){ showNotification('Fill subject and message','error'); return; }
    try{
        const res = await fetch('/api/admin/send-email',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ userId:selectedUserId, subject, message }),
            credentials:'include'
        });
        if(res.ok){ showNotification('Email sent'); closeModal('emailModal'); }
        else throw new Error('Failed to send email');
    }catch(e){ console.error(e); showNotification('Failed to send email','error'); }
}

// Fund user via backend
async function fundUser(){
    const amount = parseFloat(document.getElementById('fundAmount').value);
    if(!amount||amount<=0){ showNotification('Enter a valid amount','error'); return; }
    try{
        const res = await fetch('/api/admin/fund-user',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ userId:selectedUserId, amount }),
            credentials:'include'
        });
        if(res.ok){
            showNotification(`$${amount.toFixed(2)} added`);
            closeModal('fundModal');
            loadUsers();
        } else throw new Error('Failed to fund user');
    }catch(e){ console.error(e); showNotification('Failed to fund user','error'); }
}

function showNotification(message,type='success'){
    const n=document.getElementById('notification');
    n.textContent=message;
    n.className=`notification ${type==='error'?'error':''}`;
    n.style.display='block';
    setTimeout(()=>{n.style.display='none'},3000);
}

function logout(){ alert('Logged out'); }

loadUsers();




// Open create user modal
function openCreateUserModal(){
    document.getElementById('newFullName').value = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newPhone').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('createUserModal').style.display = 'flex';
}

// Create user
async function createUser(){
    const fullName = document.getElementById('newFullName').value;
    const email = document.getElementById('newEmail').value;
    const phone = document.getElementById('newPhone').value;
    const password = document.getElementById('newPassword').value;

    if(!fullName||!email||!phone||!password){
        showNotification('All fields are required','error');
        return;
    }

    try{
        const res = await fetch('/api/admin/create-user',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ fullName, email, phone, password }),
            credentials:'include'
        });
        if(res.ok){
            showNotification('User created successfully');
            closeModal('createUserModal');
            loadUsers();
        } else throw new Error('Failed to create user');
    }catch(e){
        console.error(e);
        showNotification('Failed to create user','error');
    }
}

// Delete user
async function deleteUser(userId){
    if(!confirm('Are you sure you want to delete this user?')) return;
    try{
        const res = await fetch(`/api/admin/delete-user/${userId}`,{
            method:'DELETE',
            credentials:'include'
        });
        if(res.ok){
            showNotification('User deleted successfully');
            loadUsers();
        } else throw new Error('Failed to delete user');
    }catch(e){
        console.error(e);
        showNotification('Failed to delete user','error');
    }
}

</script>
</body>
</html>
